openapi: 3.0.0
info:
  title: Medical Appointment System API
  version: 1.0.0
  description: API Documentation for the CareOnline Medical Appointment System
servers:
  - url: http://localhost:5001/api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
          example: "Detailed error message here"

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication operations
  - name: Appointments
    description: Medical Appointment operations
  - name: Admin
    description: Admin Management operations
  - name: Profile
    description: User Profile operations
  - name: SuperAdmin
    description: Super Admin operations
  - name: Notifications
    description: User Notifications
  - name: Chat
    description: Chat system operations

paths:
  # -----------------------------------------------
  # [หมวด Auth] จัดการเรื่องสิทธิ์และการล๊อกอิน
  # -----------------------------------------------
  /login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful login
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          
  /register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: [] 
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                fullName:
                  type: string
                email:
                  type: string
                phoneNumber:
                  type: string
      responses:
        '201':
          description: User registered successfully
        '500':
          description: Server Error (e.g. Username already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /me:
    get:
      tags: [Auth]
      summary: Get my Info
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized (Invalid or missing token)

  # -----------------------------------------------
  # [หมวด Appointments] ระบบการนัดหมายแพทย์
  # -----------------------------------------------
  /doctors:
    get:
      tags: [Appointments]
      summary: Get all doctors
      responses:
        '200':
          description: Success
        '500':
          description: Server Error

  /doctor-slots:
    get:
      tags: [Appointments]
      summary: Get available slots
      parameters: 
        - in: query 
          name: doctorId
          required: true 
          schema:
            type: integer 
        - in: query 
          name: date
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Success
        '400':
          description: Missing params
        '500':
          description: Server Error

  /book:
    post:
      tags: [Appointments]
      summary: Book an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                doctorId:
                  type: integer
                date:
                  type: string
                time:
                  type: string
      responses:
        '200':
          description: Appointment booked successfully
        '400':
          description: Slot already booked
        '500':
          description: Server Error
          
  /blocked-dates:
    get:
      tags: [Appointments]
      summary: Get list of blocked dates for a doctor
      parameters:
        - in: query
          name: doctorId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of dates
        '500':
          description: Server Error
          
  /my-appointments:
    get:
      tags: [Appointments]
      summary: Get my appointments
      responses:
        '200':
          description: A list of appointments
        '401':
          description: Unauthorized
        '500':
          description: Server Error

  # -----------------------------------------------
  # [หมวด Admin] อำนาจของแอดมินในการจัดการคิวและแพทย์
  # -----------------------------------------------
  /add-doctor:
    post:
      tags: [Admin]
      summary: Add a new doctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                specialty:
                  type: string
                phoneNumber:
                  type: string
                hospital:
                  type: string
      responses:
        '201':
          description: Doctor created successfully
        '403':
          description: Forbidden (Admin access required)
        '500':
          description: Server Error

  /all-appointments:
    get:
      tags: [Admin]
      summary: Get all appointments (Admin only)
      responses:
        '200':
          description: A list of all appointments
        '403':
          description: Forbidden (Admin access required)
        '500':
          description: Server Error

  /update-doctor/{id}: 
    put:
      tags: [Admin]
      summary: Update doctor info
      parameters: 
        - in: path 
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                specialty:
                  type: string
                phoneNumber:
                  type: string
                hospital:
                  type: string
      responses:
        '200':
          description: Successfully updated
        '403':
          description: Forbidden
        '404':
          description: Doctor not found
        '500':
          description: Server Error

  /delete-doctor/{id}:
    delete:
      tags: [Admin]
      summary: Delete a doctor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Successfully deleted
        '403':
          description: Forbidden
        '404':
          description: Doctor not found
        '500':
          description: Server Error

  /unavailable:
    post:
      tags: [Admin]
      summary: Set doctor unavailable slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                doctorId:
                  type: integer
                date:
                  type: string
                startTime:
                  type: string
                endTime:
                  type: string
      responses:
        '201':
          description: Unavailable time saved
        '403':
          description: Forbidden
        '500':
          description: Server Error

  # -----------------------------------------------
  # [หมวด Profile] ข้อมูลโปรไฟล์หน้าส่วนตัว
  # -----------------------------------------------
  /profile:
    get:
      tags: [Profile]
      summary: Fetch Profile
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: User not found
        '500':
          description: Server Error
    put:
      tags: [Profile]
      summary: Update Profile
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                phoneNumber:
                  type: string
                profilePic:
                  type: string
                  format: binary
      responses:
        '200':
          description: Profile updated successfully
        '401':
          description: Unauthorized
        '500':
          description: Server Error

  # -----------------------------------------------
  # [หมวด SuperAdmin] สิทธิ์ขั้นสูงสุดของผู้ดูแลระบบแม่
  # -----------------------------------------------
  /superadmin/create-staff:
    post:
      tags: [SuperAdmin]
      summary: Create admin staff account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [admin]
      responses:
        '201':
          description: Account created successfully
        '400':
          description: Can only create admin staff
        '403':
          description: Forbidden (Superadmin access required)
        '500':
          description: Server Error

  /superadmin/admin-count:
    get:
      tags: [SuperAdmin]
      summary: Get count of admin users
      responses:
        '200':
          description: Success
        '403':
          description: Forbidden
        '500':
          description: Server Error

  /superadmin/admins:
    get:
      tags: [SuperAdmin]
      summary: Get list of all admin users
      responses:
        '200':
          description: Success
        '403':
          description: Forbidden
        '500':
          description: Server Error

  # -----------------------------------------------
  # [หมวด Notifications] ระบบเตือนสติการจอง
  # -----------------------------------------------
  /notifications:
    get:
      tags: [Notifications]
      summary: Get user notifications
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '500':
          description: Server Error
          
  /notifications/read:
    post:
      tags: [Notifications]
      summary: Mark notifications as read
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '500':
          description: Server Error

  # -----------------------------------------------
  # [หมวด Chat] ระบบพูดคุยระหว่างแอดมินและผู้ใช้งาน
  # -----------------------------------------------
  /messages/{room}:
    get:
      tags: [Chat]
      summary: Get chat messages by room
      parameters:
        - in: path
          name: room
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '500':
          description: Server Error
          
  /chat-users:
    get:
      tags: [Chat]
      summary: Get list of users who chatted with admin
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '500':
          description: Server Error
