version: '3.8'

services:
  # ฐานข้อมูล SQL Server
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  # Backend API
  backend:
    build: ./backend
    container_name: backend-api
    environment:
      - DB_SERVER=sqlserver
      - DB_USER=sa
      - DB_PASSWORD=YourStrongPassword!
      - DB_DATABASE=proj2_2
      - PORT=5001
      - JWT_SECRET=your_jwt_secret_key
    ports:
      - "5001:5001"
    depends_on:
      - sqlserver
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend Web
  frontend:
    build: ./frontend
    container_name: frontend-web
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  sqlserver-data:
